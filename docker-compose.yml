version: '3.8'

services:
  powerscale-analyzer:
    build: .
    container_name: powerscale-analyzer
    ports:
      - "8501:8501"
    volumes:
      # Mount knowledge base if it exists
      - ./knowledge.db:/app/knowledge.db:ro
      # Mount directory for PCAP files (optional)
      - ./pcap_files:/tmp/pcap_uploads
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
